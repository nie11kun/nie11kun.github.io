<title type="text">Marco Nie - Windows 11 安装绕过登录微软账户 的评论</title>
<subtitle type="text">在 Windows 11 安装过程中，按下 Shift + F10 组合键打开命令提示符，输入start ms-cxh:localonly，即可直接创建本地账户，而且无需重启设备，无需先跳过联网步骤。</subtitle>
